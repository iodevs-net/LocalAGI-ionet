# IONET with MiniMax API
# Uncomment localai section to use local LocalAI instead

services:
  postgres:
    image: quay.io/mudler/localrecall:${LOCALRECALL_VERSION:-v0.5.2}-postgresql
    environment:
      - POSTGRES_DB=localrecall
      - POSTGRES_USER=localrecall
      - POSTGRES_PASSWORD=localrecall
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localrecall"]
      interval: 10s
      timeout: 5s
      retries: 5

  sshbox:
    build:
      context: .
      dockerfile: Dockerfile.sshbox
    ports:
      - "22"
    environment:
      - SSH_USER=root
      - SSH_PASSWORD=root
      - DOCKER_HOST=tcp://dind:2375
    depends_on:
      dind:
        condition: service_healthy

  dind:
    image: docker:dind
    privileged: true
    command: ["dockerd", "-H", "tcp://0.0.0.0:2375", "-H", "unix:///var/run/docker.sock"]
    environment:
      - DOCKER_TLS_CERTDIR=""
    expose:
      - 2375
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 10s
      timeout: 5s
      retries: 3

  mcp-ionet-workspace:
    build: mcp-ionet-workspace/
    container_name: mcp-ionet-workspace
    networks:
      - default
      - iodesk-internal
    ports:
      - 8766:8766
      - 8767:8767
    environment:
      - GOOGLE_DRIVE_CLIENT_ID=${GOOGLE_DRIVE_CLIENT_ID:-}
      - GOOGLE_DRIVE_CLIENT_SECRET=${GOOGLE_DRIVE_CLIENT_SECRET:-}
    volumes:
      - ionet_pool:/pool
      - ./mcp-ionet-workspace/drive-key.json:/app/drive-key.json:ro

  deepseek-proxy:
    build: deepseek-proxy/
    ports:
      - 3001:3001
    environment:
      - PORT=3001
      - DEEPSEEK_HOST=api.deepseek.com
      - DEEPSEEK_PROTO=https
    restart: unless-stopped

  ionet:
    depends_on:
      postgres:
        condition: service_healthy
      dind:
        condition: service_healthy
      deepseek-proxy:
        condition: service_started
    build:
      context: .
      dockerfile: Dockerfile.webui
    networks:
      - default
      - iodesk-internal
    ports:
      - 8080:3000
    environment:
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LOCALAGI_MODEL=${MODEL_NAME}
      - LOCALAGI_MULTIMODAL_MODEL=${MULTIMODAL_MODEL:-moondream2-20250414}
      - MODEL_NAME=${MODEL_NAME}
      - MULTIMODAL_MODEL=${MULTIMODAL_MODEL:-moondream2-20250414}
      - LOCALAGI_LLM_API_URL=${OPENAI_BASE_URL}
      - LOCALAGI_LLM_API_KEY=${OPENAI_API_KEY}
      - LOCALAGI_API_KEYS=${LOCALAGI_API_KEYS:-}
      - LOCALAGI_STATE_DIR=/pool
      - LOCALAGI_TIMEOUT=5m
      - LOCALAGI_ENABLE_CONVERSATIONS_LOGGING=false
      - LOCALAGI_SSHBOX_URL=root:root@sshbox:22
      - DOCKER_HOST=tcp://dind:2375
      - ION_EMAIL_USER=${ION_EMAIL_USER}
      - ION_EMAIL_PASSWORD=${ION_EMAIL_PASSWORD}
      - IODESK_MCP_TOKEN=${IODESK_MCP_TOKEN}
      - VECTOR_ENGINE=chromem
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ionet_pool:/pool
      - ./config/agents:/pool/agents:ro

networks:
  iodesk-internal:
    name: iodesk-internal
    external: true

volumes:
  postgres_data:
  models:
  backends:
  images:
  ionet_pool:
