# =============================================================================
# IONET - Docker Compose Production
# Uso: docker compose -f docker-compose.prod.yaml up -d
# =============================================================================

services:
  postgres:
    # Imagen con pg_textsearch + pgvector + vectorscale + timescaledb
    image: quay.io/mudler/localrecall:latest-postgresql
    container_name: ionet-postgres
    environment:
      - POSTGRES_DB=ionet
      - POSTGRES_USER=ionet
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ionet"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - ionet-network
    # Limitar recursos en producción
    deploy:
      resources:
        limits:
          memory: 1G

  ionet:
    image: ghcr.io/iodevs-net/localagi-ionet:latest
    container_name: ionet
    environment:
      # API LLM (configurar según proveedor)
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LOCALAGI_MODEL=${MODEL_NAME}
      - LOCALAGI_MULTIMODAL_MODEL=${MULTIMODAL_MODEL}
      - LOCALAGI_LLM_API_URL=${OPENAI_BASE_URL}
      - LOCALAGI_LLM_API_KEY=${OPENAI_API_KEY}
      
      # Seguridad - API Keys separadas por coma
      - LOCALAGI_API_KEYS=${LOCALAGI_API_KEYS}
      
      # Configuración
      - LOCALAGI_STATE_DIR=/pool
      - LOCALAGI_AGENTS_DIR=/app/config/agents
      - LOCALAGI_TIMEOUT=${TIMEOUT:-5m}
      - LOCALAGI_ENABLE_CONVERSATIONS_LOGGING=${ENABLE_LOGGING:-false}
      - LOCALAGI_BASE_URL=https://agentes.ionet.cl
      
      # Vector engine: PostgreSQL con pg_textsearch + pgvector + vectorscale
      # Go construye DATABASE_URL desde PG_* con url.URL.UserPassword()
      # que URL-encodea el password correctamente.
      - VECTOR_ENGINE=postgres
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=ionet
      - PG_PASSWORD=${POSTGRES_PASSWORD}
      - PG_DBNAME=ionet
      - PG_SSLMODE=disable
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      
      # M365 Sync (para scripts de sync)
      - M365_CLIENT_ID=${M365_CLIENT_ID}
      - M365_CLIENT_SECRET=${M365_CLIENT_SECRET}
      - M365_TENANT_ID=${M365_TENANT_ID}

      # ION Connectors
      - ION_EMAIL_USER=${ION_EMAIL_USER}
      - ION_EMAIL_PASSWORD=${ION_EMAIL_PASSWORD}
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL}

      # ioDesk MCP - acceso a datos del sistema
      - IODESK_MCP_TOKEN=${IODESK_MCP_TOKEN}
      - IODESK_MCP_URL=http://iodesk-mcp:8765/mcp

    ports:
      # App
      - "8080:3000"
      # SSH (para acceso directo al contenedor)
      - "2222:2222"
    volumes:
      # Pool persistente para estado
      - ionet_pool:/pool
      # RAG data
      - rag_data:/rag
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ionet-network
      - iodesk-internal
    # Healthcheck
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Limitar recursos en producción
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

volumes:
  postgres_data:
    name: ionet-postgres-data
    driver: local
  postgres_backup:
    name: ionet-postgres-backup
    driver: local
  ionet_pool:
    name: ionet-pool
    driver: local
  rag_data:
    name: ionet-rag-data
    driver: local

networks:
  ionet-network:
    name: ionet-network
    driver: bridge
  iodesk-internal:
    name: iodesk-internal
    external: true
